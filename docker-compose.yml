services:
  postgres:
    image: postgres:16
    container_name: cabinet-shop-platform-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cabinet_shop_platform
    ports:
      - "5433:5432"
    volumes:
      - cabinet-shop-platform-postgres:/var/lib/postgresql/data

volumes:
  cabinet-shop-platform-postgres:
